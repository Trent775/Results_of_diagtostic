<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитическая Матрица | Premium Dashboard</title>
    <!-- Подключение криптографического ядра -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <!-- Шрифты для премиального отображения -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #05080f;
            --bg-glass: rgba(15, 23, 42, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --text-highlight: #e2e8f0;
            
            /* Неоновая палитра */
            --neon-blue: #38bdf8;
            --neon-blue-glow: rgba(56, 189, 248, 0.3);
            --neon-red: #f43f5e;
            --neon-red-glow: rgba(244, 63, 94, 0.3);
            --neon-orange: #fb923c;
            --neon-green: #10b981;
            --neon-green-glow: rgba(16, 185, 129, 0.3);
        }

        * {
            box-sizing: border-box;
            white-space: normal !important;
            word-wrap: break-word !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(244, 63, 94, 0.05), transparent 25%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            width: 100%;
        }

        /* ---------------- ЭКРАН 1: ШЛЮЗ ---------------- */
        #login-screen {
            margin-top: 10vh;
            text-align: center;
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 60px 40px;
            border-radius: 24px;
            border: 1px solid var(--border-glass);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        #login-screen h2 {
            margin: 0 0 10px 0;
            font-weight: 800;
            letter-spacing: 1px;
            font-size: 22px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px;
            margin: 30px 0;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 12px;
            color: #fff;
            font-family: monospace;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            white-space: nowrap !important;
        }

        input[type="text"]:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue-glow);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            color: #fff;
            border: none;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(37, 99, 235, 0.4);
        }

        .error-msg {
            color: var(--neon-red);
            margin-top: 20px;
            display: none;
            font-size: 14px;
            font-weight: 500;
            background: rgba(244, 63, 94, 0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(244, 63, 94, 0.2);
        }

        /* ---------------- ЭКРАН 2: ДАШБОРД ---------------- */
        #profile-screen {
            display: none;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .btn-back {
            width: auto;
            background: transparent;
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
            margin-bottom: 30px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            box-shadow: none;
            text-transform: none;
            letter-spacing: normal;
        }
        
        .btn-back:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
            transform: none;
            box-shadow: none;
        }

        /* СЕТКА ДАШБОРДА */
        .header-card {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            padding: 35px 40px;
            border-radius: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            border-top: 1px solid rgba(255,255,255,0.15);
        }

        .header-card h1 { 
            margin: 0; 
            font-size: 32px; 
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff; 
        }
        
        .header-card .role { 
            color: var(--neon-blue); 
            font-size: 15px; 
            font-weight: 600; 
            margin-top: 8px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }

        .grid-main {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        @media(max-width: 850px) { .grid-main { grid-template-columns: 1fr; } }

        /* КАРТОЧКИ (ПРЕМИУМ СТИЛЬ) */
        .card {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            padding: 35px;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            color: var(--text-secondary);
        }

        .card-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--neon-blue);
            margin-right: 12px;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-blue-glow);
        }

        .text-block p {
            background: rgba(0,0,0,0.2);
            padding: 18px 24px;
            border-radius: 12px;
            margin-bottom: 16px;
            color: var(--text-highlight);
            font-size: 15px;
            border-left: 3px solid rgba(255,255,255,0.1);
        }
        .text-block p:last-child { margin-bottom: 0; }

        /* ИНТЕРАКТИВНЫЕ ГРАФИКИ */
        .metric-row {
            margin-bottom: 25px;
        }
        .metric-row:last-child { margin-bottom: 0; }

        .metric-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
        }

        .metric-label { 
            font-size: 14px; 
            font-weight: 600; 
            color: #fff;
            letter-spacing: 0.5px;
        }
        
        .metric-value { 
            font-size: 20px; 
            font-weight: 800; 
            font-family: monospace;
        }

        .progress-track {
            background-color: rgba(0,0,0,0.5);
            border-radius: 10px;
            height: 14px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            width: 0; /* Стартует с нуля для анимации */
            transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
        }

        /* Эффект блика на графике */
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }

        .metric-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 10px;
            line-height: 1.5;
        }

        /* КРИТИЧЕСКИЙ РИСК (АКТ 2) */
        .risk-card {
            border: 1px solid rgba(244, 63, 94, 0.3);
            background: linear-gradient(145deg, rgba(244, 63, 94, 0.08) 0%, var(--bg-glass) 100%);
            margin-bottom: 25px;
        }
        .risk-card .card-title::before { 
            background-color: var(--neon-red); 
            box-shadow: 0 0 10px var(--neon-red-glow);
        }
        .risk-card .card-title { color: var(--neon-red); }
        
        .risk-text p {
            background: transparent;
            border-left: none;
            padding: 0;
            color: #fda4af;
            font-weight: 400;
            font-size: 16px;
            margin-bottom: 16px;
        }

        /* ПРОТОКОЛ ВЗЛОМА (АКТ 3) */
        .protocol-card {
            border: 1px solid rgba(16, 185, 129, 0.3);
            background: linear-gradient(145deg, rgba(16, 185, 129, 0.08) 0%, var(--bg-glass) 100%);
            margin-bottom: 25px;
        }
        .protocol-card .card-title::before { 
            background-color: var(--neon-green); 
            box-shadow: 0 0 10px var(--neon-green-glow);
        }
        .protocol-card .card-title { color: var(--neon-green); }
        .protocol-text p {
            background: transparent;
            border-left: none;
            padding: 0;
            color: #6ee7b7;
            font-weight: 500;
            font-size: 15px;
        }

        /* ТЕХНИЧЕСКИЙ ДОПУСК */
        .tech-box {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .tech-badge {
            background: rgba(0,0,0,0.3);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            border: 1px solid var(--border-glass);
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- ШЛЮЗ -->
    <div id="login-screen">
        <h2>СИСТЕМНЫЙ АУДИТ</h2>
        <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 30px;">Модуль расшифровки аналитической матрицы</p>
        <input type="text" id="token-input" placeholder="Введите токен безопасности">
        <button onclick="attemptDecryption()">Инициализация</button>
        <div id="error-message" class="error-msg"></div>
    </div>

    <!-- ДАШБОРД -->
    <div id="profile-screen">
        <button class="btn-back" onclick="location.reload()">Закрыть профиль</button>
        
        <div class="header-card">
            <h1 id="user-name">Загрузка...</h1>
            <div id="user-role" class="role">ИДЕНТИФИКАЦИЯ...</div>
        </div>

        <div class="grid-main">
            <!-- Блок 1: Легенда -->
            <div class="card">
                <div class="card-title">Рабочая модель / Легенда</div>
                <div id="block-legend" class="text-block"></div>
            </div>

            <!-- Блок 2: Интерактивные Метрики -->
            <div class="card">
                <div class="card-title">Карта внутреннего натяжения</div>
                <div id="block-metrics"></div>
            </div>
        </div>

        <!-- Блок 3: Критический парадокс (АКТ 2) -->
        <div class="card risk-card" id="card-paradox">
            <div class="card-title">Критический узел / Скрытые риски</div>
            <div id="block-paradox" class="text-block risk-text"></div>
        </div>

        <!-- Блок 4: Протокол взлома (АКТ 3) -->
        <div class="card protocol-card" id="card-protocol" style="display: none;">
            <div class="card-title">Протокол деконструкции системы</div>
            <div id="block-protocol" class="text-block protocol-text"></div>
        </div>

        <!-- Блок 5: Технический допуск -->
        <div class="card" style="padding: 25px;">
            <div class="card-title" style="margin-bottom: 15px;">Верификация данных</div>
            <div id="block-tech" class="tech-box"></div>
        </div>
    </div>

</div>

<script>
    window.onload = function() {
        fetch('database.json')
            .then(response => response.json())
            .then(data => { window.encryptedDB = data; })
            .catch(error => { showError("Ошибка связи: база данных недоступна."); });
    };

    function showError(text) {
        const errorDiv = document.getElementById('error-message');
        errorDiv.innerText = text;
        errorDiv.style.display = 'block';
    }

    function attemptDecryption() {
        let token = document.getElementById('token-input').value.trim();
        document.getElementById('error-message').style.display = 'none';

        if(!window.encryptedDB) {
            showError("База данных загружается. Пожалуйста, подождите.");
            return;
        }

        const lastDash = token.lastIndexOf('-');
        if (lastDash === -1) {
            showError("Отказано в доступе. Неверный формат токена.");
            return;
        }

        let userId = token.substring(0, lastDash);
        let encryptedBase64 = window.encryptedDB[userId] || 
                              window.encryptedDB[userId.replace(/_/g, ' ')] || 
                              window.encryptedDB[userId.replace(/ /g, '_')];

        if (!encryptedBase64) {
            showError("Отказано в доступе. Субъект не найден в реестре.");
            return;
        }

        try {
            const tokenBytes = CryptoJS.enc.Utf8.parse(token);
            const key = CryptoJS.SHA256(tokenBytes);
            const iv = CryptoJS.MD5(tokenBytes);

            const decrypted = CryptoJS.AES.decrypt(encryptedBase64, key, {
                iv: iv,
                mode: CryptoJS.mode.CBC,
                padding: CryptoJS.pad.Pkcs7
            });
            
            const rawText = decrypted.toString(CryptoJS.enc.Utf8);
            if (!rawText) throw new Error();

            buildPremiumDashboard(userId, rawText);
        } catch (e) {
            showError("Отказано в доступе. Криптографический ключ недействителен.");
        }
    }

    function formatTextToParagraphs(textBlock) {
        return textBlock.split('\n')
            .map(line => line.trim())
            .filter(line => line.length > 0)
            .map(line => `<p>${line}</p>`)
            .join('');
    }

    function buildPremiumDashboard(fullId, rawText) {
        // Убиваем возможные проблемы с переносами каретки Windows
        let text = rawText.replace(/\r\n/g, '\n');
        
        // 1. ЖЕЛЕЗОБЕТОННЫЙ ПАРСИНГ: режем весь текст по символу ▍
        let sections = text.split('▍');
        
        // Первый кусок всегда содержит имя и должность
        let headerLines = sections[0].split('\n').map(l => l.trim()).filter(l => l.length > 0);
        let name = "Неизвестно";
        let role = "Специалист";
        
        if (headerLines.length > 0) name = headerLines[0].replace('ПРОФИЛЬ:', '').trim();
        if (headerLines.length > 1) role = headerLines[1];
        
        document.getElementById('user-name').innerText = name;
        document.getElementById('user-role').innerText = role;

        // Переменные для блоков
        let techText = "", act1Text = "", mapText = "", act2Text = "", act3Text = "";

        // Разбираем отрезанные куски по заголовкам
        for (let i = 1; i < sections.length; i++) {
            let sec = sections[i].trim();
            if (sec.startsWith('ТЕХНИЧЕСКИЙ ДОПУСК')) {
                techText = sec.substring(sec.indexOf('\n')).trim();
            } else if (sec.startsWith('АКТ 1')) {
                act1Text = sec.substring(sec.indexOf('\n')).trim();
            } else if (sec.startsWith('КАРТА ВНУТРЕННЕГО НАТЯЖЕНИЯ')) {
                mapText = sec.substring(sec.indexOf('\n')).trim();
            } else if (sec.startsWith('АКТ 2')) {
                act2Text = sec.substring(sec.indexOf('\n')).trim();
            } else if (sec.startsWith('АКТ 3')) {
                act3Text = sec.substring(sec.indexOf('\n')).trim();
            }
        }

        // РЕНДЕР: Технический допуск
        if (techText) {
            let badges = techText.split('\n').filter(l=>l.trim()!=='').map(l => `<div class="tech-badge">${l}</div>`).join('');
            document.getElementById('block-tech').innerHTML = badges;
        }

        // РЕНДЕР: Акт 1 (Легенда)
        if (act1Text) document.getElementById('block-legend').innerHTML = formatTextToParagraphs(act1Text);

        // РЕНДЕР: Графики натяжения
        let metricsHtml = "";
        let animDelays = []; // Для анимации
        
        if (mapText) {
            let lines = mapText.split('\n');
            lines.forEach((line, index) => {
                // Идеальная регулярка: ищет текст в скобках [Название], любые символы, процент, и текст в круглых скобках
                let m = line.match(/\[(.*?)\][^\d]*(\d+)\s*%[^\(]*\((.*?)\)/);
                if (m) {
                    let label = m[1].trim();
                    let percentVal = parseInt(m[2]);
                    let desc = m[3].trim();
                    
                    // Цветовая логика дашборда
                    let color = "var(--neon-blue)";
                    let glow = "var(--neon-blue-glow)";
                    
                    if (percentVal >= 80) { color = "var(--neon-red)"; glow = "var(--neon-red-glow)"; }
                    else if (percentVal >= 50) { color = "var(--neon-orange)"; glow = "rgba(251, 146, 60, 0.3)"; }
                    else if (percentVal <= 20) { color = "var(--neon-green)"; glow = "var(--neon-green-glow)"; }

                    metricsHtml += `
                        <div class="metric-row">
                            <div class="metric-header">
                                <div class="metric-label">${label}</div>
                                <div class="metric-value" style="color: ${color}; text-shadow: 0 0 10px ${glow};">${percentVal}%</div>
                            </div>
                            <div class="progress-track">
                                <!-- ID добавлен для запуска анимации после рендера -->
                                <div class="progress-fill" id="bar-${index}" style="background-color: ${color}; box-shadow: 0 0 10px ${glow};"></div>
                            </div>
                            <div class="metric-desc">${desc}</div>
                        </div>
                    `;
                    animDelays.push({ id: `bar-${index}`, width: percentVal });
                }
            });
        }
        document.getElementById('block-metrics').innerHTML = metricsHtml || "<p style='color: var(--text-secondary)'>Данные метрик отсутствуют.</p>";

        // РЕНДЕР: Акт 2 (Риски)
        if (act2Text) document.getElementById('block-paradox').innerHTML = formatTextToParagraphs(act2Text);

        // РЕНДЕР: Акт 3 (Протокол)
        if (act3Text) {
            document.getElementById('block-protocol').innerHTML = formatTextToParagraphs(act3Text);
            document.getElementById('card-protocol').style.display = 'block';
        } else {
            document.getElementById('card-protocol').style.display = 'none';
        }

        // Переключение экранов и запуск анимации
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('profile-screen').style.display = 'block';

        // Запускаем графики с небольшой задержкой для WOW-эффекта
        setTimeout(() => {
            animDelays.forEach(item => {
                let el = document.getElementById(item.id);
                if (el) el.style.width = item.width + "%";
            });
        }, 100);
    }
</script>

</body>
</html>
