<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Системный Аудит Персонала — Дашборд</title>
    <!-- Подключение криптографического ядра -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg-color: #090d16;
            --card-bg: #131926;
            --card-border: #222f43;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-red: #f87171;
            --accent-orange: #fb923c;
            --accent-green: #34d399;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        /* АБСОЛЮТНАЯ ЗАЩИТА ОТ ОБРЕЗКИ ТЕКСТА (БЕЗ МНОГОТОЧИЙ) */
        * {
            white-space: normal !important;
            word-wrap: break-word !important;
            overflow-wrap: break-word !important;
        }

        /* ЭКРАН 1: ШЛЮЗ АВТОРИЗАЦИИ */
        #login-screen {
            text-align: center;
            background-color: var(--card-bg);
            padding: 50px 30px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }

        #login-screen h2 {
            margin-top: 0;
            letter-spacing: 2px;
            font-size: 24px;
            color: #fff;
        }

        input[type="text"] {
            width: 80%;
            max-width: 420px;
            padding: 16px;
            margin: 25px 0;
            background: #090d16;
            border: 1px solid var(--accent-blue);
            border-radius: 6px;
            color: #fff;
            font-family: monospace;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: 0.3s;
            /* Для поля ввода отменяем перенос, чтобы токен был одной строкой */
            white-space: nowrap !important; 
        }

        input[type="text"]:focus {
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        button {
            background-color: var(--accent-blue);
            color: #090d16;
            border: none;
            padding: 16px 45px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0ea5e9;
            transform: translateY(-1px);
        }

        .error-msg {
            color: var(--accent-red);
            margin-top: 15px;
            display: none;
            font-size: 14px;
            font-weight: 500;
        }

        /* ЭКРАН 2: СОВРЕМЕННЫЙ ДАШБОРД */
        #profile-screen {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-back {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            margin-bottom: 20px;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .btn-back:hover {
            background: var(--card-border);
            color: #fff;
        }

        /* СЕТКА ДАШБОРДА */
        .dashboard-header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            margin-bottom: 20px;
        }

        .dashboard-header h1 { margin: 0; font-size: 28px; color: #fff; }
        .dashboard-header .role { color: var(--accent-blue); font-size: 16px; font-weight: 600; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px;}

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media(max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 25px;
            border-radius: 12px;
            position: relative;
        }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            color: var(--text-muted);
        }

        .card-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background-color: var(--accent-blue);
            margin-right: 10px;
            border-radius: 2px;
        }

        .legend-text p {
            background-color: #1a2333;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            line-height: 1.6;
            color: #cbd5e1;
            font-size: 15px;
            border-left: 2px solid #334155;
        }

        /* ИНДИКАТОРЫ НАПРЯЖЕНИЯ (ГРАФИКИ) */
        .metric-row {
            margin-bottom: 18px;
        }

        .metric-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .metric-label { color: #fff; }
        .metric-value { font-weight: 700; }

        .progress-container {
            background-color: #090d16;
            border-radius: 6px;
            height: 12px;
            overflow: hidden;
            width: 100%;
            border: 1px solid #1e293b;
        }

        .progress-bar {
            height: 100%;
            border-radius: 6px;
            width: 0;
            transition: width 1s ease-in-out;
        }

        .metric-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.4;
        }

        /* КАРТОЧКА КРИТИЧЕСКОГО РИСКА */
        .risk-card {
            border-left: 4px solid var(--accent-red) !important;
            background: linear-gradient(90deg, #241419 0%, #131926 100%);
        }
        .risk-card .card-title::before { background-color: var(--accent-red); }
        .risk-text { color: #fca5a5; font-weight: 500; line-height: 1.6; font-size: 15px;}

        .tech-badge {
            display: inline-block;
            background-color: #1e293b;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-main);
            border: 1px solid var(--card-border);
            margin-top: 8px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- ЭКРАН Авторизации -->
    <div id="login-screen">
        <h2>СИСТЕМНЫЙ АУДИТ ПЕРСОНАЛА</h2>
        <p style="color: var(--text-muted); font-size: 15px;">Введите токен-ключ сотрудника для безопасного развертывания аналитической матрицы</p>
        <input type="text" id="token-input" placeholder="Имя_Фамилия-Код">
        <br>
        <button onclick="attemptDecryption()">Открыть дашборд</button>
        <div id="error-message" class="error-msg"></div>
    </div>

    <!-- ЭКРАН Результатов -->
    <div id="profile-screen">
        <button class="btn-back" onclick="location.reload()">← Закрыть профиль</button>
        
        <div class="dashboard-header">
            <h1 id="user-name">Загрузка...</h1>
            <div id="user-role" class="role">Должность</div>
        </div>

        <div class="grid-2">
            <!-- Блок 1: Легенда -->
            <div class="card">
                <div class="card-title">Рабочая модель / Легенда</div>
                <div id="block-legend" class="legend-text"></div>
            </div>

            <!-- Блок 2: Графики натяжения -->
            <div class="card">
                <div class="card-title">Карта внутреннего натяжения</div>
                <div id="block-metrics"></div>
            </div>
        </div>

        <!-- Блок 3: Критический парадокс (Яркое пятно внимания) -->
        <div class="card risk-card" style="margin-bottom: 20px;">
            <div class="card-title" style="color: var(--accent-red);">Критический узел / Куда уходит батарейка</div>
            <div id="block-paradox" class="risk-text"></div>
        </div>

        <!-- Блок 4: Технический допуск -->
        <div class="card">
            <div class="card-title">Верификация данных</div>
            <div id="block-tech"></div>
        </div>
    </div>

</div>

<script>
    window.onload = function() {
        fetch('database.json')
            .then(response => response.json())
            .then(data => { window.encryptedDB = data; })
            .catch(error => { showError("Ошибка: не удалось подключить базу данных."); });
    };

    function showError(text) {
        const errorDiv = document.getElementById('error-message');
        errorDiv.innerText = text;
        errorDiv.style.display = 'block';
    }

    function attemptDecryption() {
        let token = document.getElementById('token-input').value.trim();
        document.getElementById('error-message').style.display = 'none';

        if(!window.encryptedDB) {
            showError("База данных еще загружается. Пожалуйста, подождите.");
            return;
        }

        const lastDash = token.lastIndexOf('-');
        if (lastDash === -1) {
            showError("Неверный формат ключа. Проверьте правильность скопированного токена.");
            return;
        }

        let userId = token.substring(0, lastDash);
        let encryptedBase64 = window.encryptedDB[userId];

        if (!encryptedBase64) {
            let altId = userId.replace(/_/g, ' ');
            encryptedBase64 = window.encryptedDB[altId];
            if(encryptedBase64) userId = altId;
        }
        if (!encryptedBase64) {
            let altId = userId.replace(/ /g, '_');
            encryptedBase64 = window.encryptedDB[altId];
            if(encryptedBase64) userId = altId;
        }

        if (!encryptedBase64) {
            showError("Сотрудник с таким именем не найден в контуре матрицы.");
            return;
        }

        try {
            const tokenBytes = CryptoJS.enc.Utf8.parse(token);
            const key = CryptoJS.SHA256(tokenBytes);
            const iv = CryptoJS.MD5(tokenBytes);

            const decrypted = CryptoJS.AES.decrypt(encryptedBase64, key, {
                iv: iv,
                mode: CryptoJS.mode.CBC,
                padding: CryptoJS.pad.Pkcs7
            });
            
            const rawText = decrypted.toString(CryptoJS.enc.Utf8);
            if (!rawText) throw new Error();

            buildDashboard(userId, rawText);
        } catch (e) {
            showError("Ошибка доступа. Токен-ключ не совпал с криптографическим замком.");
        }
    }

    function buildDashboard(fullId, text) {
        let nameParts = fullId.split('_');
        if(nameParts.length < 2) nameParts = fullId.split(' ');
        
        let name = nameParts[0] + " " + (nameParts[1] || "");
        let role = nameParts.slice(2).join(' ') || "Специалист";

        document.getElementById('user-name').innerText = name.toUpperCase();
        document.getElementById('user-role').innerText = role;

        let cleanText = text.replace(/ПРОФИЛЬ:[^\n]*/, '');
        
        let techMatch = cleanText.match(/▍ТЕХНИЧЕСКИЙ ДОПУСК([\s\S]*?)(?=▍|$)/);
        let techHtml = "";
        if(techMatch) {
            techHtml = techMatch[1].trim().split('\n').filter(l=>l.trim()!=='').map(line => `<div class="tech-badge">${line}</div>`).join(' ');
        }
        document.getElementById('block-tech').innerHTML = techHtml || "<div class='tech-badge'>Данные верифицированы штатно.</div>";

        let legendMatch = cleanText.match(/▍АКТ 1\.[^\n]*([\s\S]*?)(?=▍|$)/);
        if(legendMatch) {
            let paragraphs = legendMatch[1].trim().split('\n').filter(p => p.trim() !== '').map(p => `<p>${p}</p>`).join('');
            document.getElementById('block-legend').innerHTML = paragraphs;
        }

        let mapMatch = cleanText.match(/▍КАРТА ВНУТРЕННЕГО НАТЯЖЕНИЯ([\s\S]*?)(?=▍|$)/);
        let metricsHtml = "";
        if(mapMatch) {
            let lines = mapMatch[1].trim().split('\n');
            lines.forEach(line => {
                let m = line.match(/\[(.*?)\]\s*([0-9\s#%=]*%)\s*\((.*?)\)/);
                if(m) {
                    let label = m[1];
                    let percentStr = m[2].replace(/[^0-9%]/g, '');
                    let percentVal = parseInt(percentStr);
                    let desc = m[3];
                    
                    let colorClass = "var(--accent-blue)";
                    if(percentVal >= 80) colorClass = "var(--accent-red)";
                    else if(percentVal >= 50) colorClass = "var(--accent-orange)";
                    else if(percentVal <= 20) colorClass = "var(--accent-green)";

                    metricsHtml += `
                        <div class="metric-row">
                            <div class="metric-info">
                                <span class="metric-label">[${label}]</span>
                                <span class="metric-value" style="color: ${colorClass}">${percentStr}</span>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar" style="width: ${percentVal}%; background-color: ${colorClass};"></div>
                            </div>
                            <div class="metric-desc">${desc}</div>
                        </div>
                    `;
                }
            });
        }
        document.getElementById('block-metrics').innerHTML = metricsHtml || "Показатели стабильны.";

        let batteryMatch = cleanText.match(/▍АКТ 2\.[^\n]*([\s\S]*?)$/);
        if(batteryMatch) {
            let pText = batteryMatch[1].trim().replace(/\n/g, '<br><br>');
            document.getElementById('block-paradox').innerHTML = pText;
        }

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('profile-screen').style.display = 'block';
    }
</script>

</body>
</html>
